extent.reporter.html.start=true
extent.reporter.html.out=target/extent-report/Index.html

# 📸 Configurações estritas para anexar capturas de tela no Cucumber 7
extent.reporter.html.screencast=true
screenshot.find.everywhere=true

# Força o Extent a embutir a imagem diretamente no HTML ou linkar no passo correto
cucumber.plugin.extent.screenshot=everyStep